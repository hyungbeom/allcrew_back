spring.application.name=allcrew

# PostgreSQL 로컬 DB 사용 (application-postgres.properties)
spring.profiles.active=postgres

# MyBatis
mybatis.mapper-packages=com.nodex.allcrew.mapper
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.nodex.allcrew.domain
mybatis.configuration.map-underscore-to-camel-case=true

# 스키마 초기화 (프로필별로 mode 오버라이드)
spring.sql.init.schema-locations=classpath:schema.sql
