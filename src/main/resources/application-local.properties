# 로컬 개발용 H2 인메모리 DB (PostgreSQL 호환 모드)
spring.datasource.url=jdbc:h2:mem:allcrew;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# 앱 시작 시 schema.sql, data.sql 자동 실행
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# H2 웹 콘솔 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
